name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Define release subprojects
        run: |
          {
            echo 'RELEASE_SUBPROJECTS<<EOF'
            echo '1.20.1-fabric'
            echo '1.20.1-forge'
            echo '1.21.1-fabric'
            echo '1.21.1-neo'
            echo '26.1-fabric'
            echo '26.1-neo'
            echo '26.1.2-fabric'
            echo '26.1.2-neo'
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Compute new version
        run: |
          CURRENT=$(grep '^modVersion=' gradle.properties | cut -d'=' -f2)
          MAJOR=$(echo "$CURRENT" | cut -d'.' -f1)
          MINOR=$(echo "$CURRENT" | cut -d'.' -f2)
          PATCH=$(echo "$CURRENT" | cut -d'.' -f3)

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            none)  ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "CURRENT_VERSION=$CURRENT" >> "$GITHUB_ENV"
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Update modVersion in gradle.properties
        run: |
          sed -i "s/^modVersion=.*/modVersion=$NEW_VERSION/" gradle.properties

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'jetbrains'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build release subprojects
        run: |
          chmod u+x ./gradlew
          TASKS=()
          while IFS= read -r SUBPROJECT; do
            if [ ! -d "$SUBPROJECT" ]; then
              echo "::error::Subproject '$SUBPROJECT' does not exist."
              exit 1
            fi
            TASKS+=(":$SUBPROJECT:build")
          done <<< "$RELEASE_SUBPROJECTS"
          ./gradlew -PmodVersion="$NEW_VERSION" "${TASKS[@]}"

      - name: Verify release artifacts
        run: |
          RELEASE_FILES="$(mktemp)"
          while IFS= read -r SUBPROJECT; do
            mapfile -t ARTIFACTS < <(
              find "$SUBPROJECT/build/libs" -maxdepth 1 -type f \
                -name "*-${SUBPROJECT}-v${NEW_VERSION}.jar" \
                ! -name "*-sources.jar" \
                ! -name "*-javadoc.jar" \
                ! -name "*-dev.jar" \
                | sort
            )
            if [ "${#ARTIFACTS[@]}" -ne 1 ]; then
              echo "::error::Expected exactly one release artifact for '$SUBPROJECT' v$NEW_VERSION, found ${#ARTIFACTS[@]}."
              echo "::group::$SUBPROJECT/build/libs"
              find "$SUBPROJECT/build/libs" -maxdepth 1 -type f -print | sort || true
              echo "::endgroup::"
              exit 1
            fi
            ARTIFACT="${ARTIFACTS[0]}"
            echo "$ARTIFACT"
            echo "$ARTIFACT" >> "$RELEASE_FILES"
          done <<< "$RELEASE_SUBPROJECTS"
          {
            echo 'RELEASE_FILES<<EOF'
            cat "$RELEASE_FILES"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Commit, tag and push
        run: |
          TAG="v${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          if ! git diff --cached --quiet; then
            git commit -m "release: v${NEW_VERSION}"
          fi
          git tag "$TAG"
          git push origin HEAD --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.NEW_VERSION }}
          generate_release_notes: true
          files: ${{ env.RELEASE_FILES }}
